<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-labelledby="title desc">
  <title id="title">QuantRead route evolution from dirty winner to coherent route contract</title>
  <desc id="desc">A three-stage diagram showing yesterday's profitable dirty system, today's contradictory losing stack, and the current route-owned execution contract.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#08111f"/>
      <stop offset="1" stop-color="#02050a"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f5d66e"/>
      <stop offset="1" stop-color="#b9912d"/>
    </linearGradient>
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono{font-family:ui-monospace,SFMono-Regular,Menlo,Consolas,monospace}
      .sans{font-family:Inter,Arial,Helvetica,sans-serif}
      .muted{fill:#91a1b7}
      .white{fill:#f6fbff}
      .goldText{fill:#f3d56b}
      .green{fill:#7ee7b8}
      .red{fill:#ff7b7b}
      .panel{fill:#101827;stroke:#26364d;stroke-width:2}
      .line{stroke:#364862;stroke-width:2}
      .arrow{stroke:#d9b64f;stroke-width:3;fill:none;marker-end:url(#arrow)}
      .small{font-size:20px}
      .body{font-size:24px}
      .title{font-size:33px;font-weight:800}
      .label{font-size:18px;font-weight:800;letter-spacing:.14em}
    </style>
    <marker id="arrow" markerWidth="12" markerHeight="12" refX="8" refY="6" orient="auto">
      <path d="M2,2 L10,6 L2,10 Z" fill="#d9b64f"/>
    </marker>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <g opacity=".17">
    <path d="M0 120H1200M0 240H1200M0 360H1200M0 480H1200M0 600H1200" class="line"/>
    <path d="M120 0V760M240 0V760M360 0V760M480 0V760M600 0V760M720 0V760M840 0V760M960 0V760M1080 0V760" class="line"/>
  </g>
  <text x="64" y="76" class="sans white" font-size="42" font-weight="900">QuantRead Execution Evolution</text>
  <text x="66" y="112" class="sans muted small">From profitable dirt, to contradictory cleanliness, to route-owned decisions.</text>
  <g transform="translate(56 158)">
    <rect class="panel" x="0" y="0" width="326" height="470" rx="18"/>
    <text x="28" y="48" class="sans label goldText">YESTERDAY</text>
    <text x="28" y="90" class="sans title white">Dirty Winner</text>
    <text x="28" y="130" class="sans muted body">The system let useful</text>
    <text x="28" y="160" class="sans muted body">paths through even when</text>
    <text x="28" y="190" class="sans muted body">the labels looked messy.</text>
    <g transform="translate(28 230)">
      <rect x="0" y="0" width="270" height="50" rx="10" fill="#132719" stroke="#2a8c61"/>
      <text x="18" y="32" class="mono green small">UBER / PLTR / CVNA / MSFT</text>
      <rect x="0" y="70" width="270" height="50" rx="10" fill="#132719" stroke="#2a8c61"/>
      <text x="18" y="102" class="mono green small">early evidence paid</text>
      <rect x="0" y="140" width="270" height="50" rx="10" fill="#1b1f2a" stroke="#45546a"/>
      <text x="18" y="172" class="mono muted small">route names unclear</text>
    </g>
    <text x="28" y="440" class="sans green small">Profitable, but hard to audit.</text>
  </g>
  <path class="arrow" d="M400 390 C446 390 465 390 512 390"/>
  <g transform="translate(438 158)">
    <rect class="panel" x="0" y="0" width="326" height="470" rx="18"/>
    <text x="28" y="48" class="sans label red">TODAY'S FAILURE</text>
    <text x="28" y="90" class="sans title white">Clean Loser</text>
    <text x="28" y="130" class="sans muted body">Old blocks and new goals</text>
    <text x="28" y="160" class="sans muted body">argued with each other.</text>
    <text x="28" y="190" class="sans muted body">Good paths became late.</text>
    <g transform="translate(28 230)">
      <rect x="0" y="0" width="270" height="50" rx="10" fill="#2a1717" stroke="#8d3030"/>
      <text x="18" y="32" class="mono red small">WATCH_PULLBACK overload</text>
      <rect x="0" y="70" width="270" height="50" rx="10" fill="#2a1717" stroke="#8d3030"/>
      <text x="18" y="102" class="mono red small">anonymous SATY trigger</text>
      <rect x="0" y="140" width="270" height="50" rx="10" fill="#2a1717" stroke="#8d3030"/>
      <text x="18" y="172" class="mono red small">old grade friction</text>
    </g>
    <text x="28" y="440" class="sans red small">Neater labels, worse behavior.</text>
  </g>
  <path class="arrow" d="M782 390 C828 390 847 390 894 390"/>
  <g transform="translate(820 158)">
    <rect class="panel" x="0" y="0" width="326" height="470" rx="18"/>
    <text x="28" y="48" class="sans label goldText">CURRENT</text>
    <text x="28" y="90" class="sans title white">Route Contract</text>
    <text x="28" y="130" class="sans muted body">The profitable paths stay.</text>
    <text x="28" y="160" class="sans muted body">The receipt now says who</text>
    <text x="28" y="190" class="sans muted body">owned the decision.</text>
    <g transform="translate(28 230)">
      <rect x="0" y="0" width="270" height="50" rx="10" fill="#17221b" stroke="#2a8c61"/>
      <text x="18" y="32" class="mono green small">WINNER_LAUNCH</text>
      <rect x="0" y="70" width="270" height="50" rx="10" fill="#17221b" stroke="#2a8c61"/>
      <text x="18" y="102" class="mono green small">OPEN_TRIGGER_IMPULSE</text>
      <rect x="0" y="140" width="270" height="50" rx="10" fill="#17221b" stroke="#2a8c61"/>
      <text x="18" y="172" class="mono green small">PULLBACK_RELEASE</text>
    </g>
    <text x="28" y="440" class="sans green small">Same edge, cleaner truth.</text>
  </g>
  <g transform="translate(76 670)">
    <rect x="0" y="0" width="1048" height="54" rx="14" fill="#101827" stroke="#26364d"/>
    <text x="26" y="35" class="mono goldText small">Current replay check: VZ + XLV + BAC + CLSK = +$148.08 estimated under the 30m/1% exit model.</text>
  </g>
</svg>
